<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AKG PPL Quiz</title>
<style>
:root{--bg:#f3f7fb;--card:#fff;--soft:#f8fafc;--text:#0f172a;--muted:#64748b;--line:#cbd5e1;--blue:#0284c7;--blue2:#eaf2fb;--ok:#16a34a;--bad:#dc2626;--warn:#d97706}
body.dark{--bg:#020617;--card:#0f172a;--soft:#111827;--text:#f8fafc;--muted:#94a3b8;--line:#334155;--blue:#38bdf8;--blue2:#1e293b;--ok:#34d399;--bad:#fb7185;--warn:#fbbf24}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}main{max-width:1120px;margin:auto;padding:16px;display:grid;gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:16px;box-shadow:0 8px 22px #0f172a18}h1{margin:0;font-size:clamp(28px,5vw,42px)}h2{margin:0;font-size:clamp(22px,4vw,30px)}button,select,input,textarea{font:inherit}button{cursor:pointer;font-weight:800}.btn{border:1px solid var(--line);border-radius:4px;background:var(--card);color:var(--text);padding:10px 14px}.primary{background:var(--blue);border-color:var(--blue);color:white}.danger{background:var(--bad);border-color:var(--bad);color:white}.btn:hover,.opt:hover:not(:disabled){background:var(--blue2)}.btn:disabled{opacity:.45;cursor:not-allowed}.chosen{border-color:var(--blue);background:var(--blue2)}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.top{justify-content:space-between}.filters{display:grid;grid-template-columns:1fr 1.3fr .6fr .9fr auto;gap:10px;align-items:end}.field{display:grid;gap:5px;color:var(--muted);font-size:14px}select,input,textarea{width:100%;border:1px solid var(--line);border-radius:4px;background:var(--card);color:var(--text);padding:10px}textarea{min-height:76px;resize:vertical}.muted{color:var(--muted)}.pill{background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:5px 9px;font-size:13px}.log{margin-top:10px;background:var(--soft);border:1px solid var(--line);border-radius:4px;padding:10px;color:var(--muted);max-height:150px;overflow:auto;font-size:14px}.hidden{display:none!important}.meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:13px}.meta span+span:before{content:'•';margin-right:8px}.qtop{display:flex;justify-content:space-between;gap:12px}.score{font-weight:900;white-space:nowrap}.bar{height:9px;background:var(--soft);border-radius:4px;overflow:hidden;margin:14px 0}.bar i{display:block;height:100%;background:var(--blue)}.opts{display:grid;gap:10px;margin-top:16px}.opt{border:1px solid var(--line);border-radius:5px;background:var(--card);color:var(--text);padding:14px;text-align:left;line-height:1.35}.right{border-color:var(--ok);background:#dcfce7;color:#052e16}.wrong{border-color:var(--bad);background:#fee2e2;color:#450a0a}body.dark .right{background:#064e3b;color:#ecfdf5}body.dark .wrong{background:#7f1d1d;color:#fff}.explain{margin-top:14px;border:1px solid var(--warn);background:#fffbeb;color:#451a03;border-radius:5px;padding:12px}body.dark .explain{background:#422006;color:#fff7ed}.imgbox{margin:14px 0;border:1px solid var(--line);background:var(--soft);border-radius:5px;padding:10px}.imgbox header{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px}.imgbox img{display:block;max-width:100%;max-height:460px;margin:auto;border-radius:4px;cursor:zoom-in}.imgbox.min img,.imgbox.min p{display:none}.review,.stats,.answers{display:grid;gap:10px;margin-top:14px}.answerCard b{color:var(--ok)}.item{border:1px solid var(--line);border-radius:5px;background:var(--soft);padding:10px}.item.bad{border-color:var(--bad)}.statsGrid,.editGrid,.bottom{display:grid;gap:10px}.statsGrid{grid-template-columns:repeat(3,1fr)}.editGrid{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}.bottom{grid-template-columns:minmax(260px,1fr) 180px 180px 180px;align-items:end}.bottom .btn,.bottom input[type=file]{height:42px}.bottom input[type=file]{border:2px dashed var(--line);background:var(--soft);padding:7px 10px}.bottom input[type=file]:hover{border-color:var(--blue);background:var(--blue2)}.lightbox{position:fixed;inset:0;z-index:99;background:#000c;display:grid;grid-template-rows:auto 1fr;gap:10px;padding:18px}.lightboxTop{display:flex;justify-content:space-between;color:white}.lightboxBody{overflow:auto;background:var(--card);border-radius:5px;padding:10px}.lightbox img{display:block;margin:auto;max-width:none}.lightbox img.fit{max-width:100%;max-height:82vh}.theme[aria-pressed=true]{background:#0f172a;color:#fff}body.dark .theme[aria-pressed=true]{background:#e2e8f0;color:#0f172a}@media(max-width:820px){.filters,.editGrid,.statsGrid,.bottom{grid-template-columns:1fr}.qtop{display:block}}

html{overflow-y:scroll;scrollbar-gutter:stable}#quiz{min-height:620px;overflow-anchor:none}.opts{min-height:245px}.opt{min-height:54px}.imgbox{overflow-anchor:none}.imgbox.pending{display:none}.imghold{display:flex;align-items:center;justify-content:center;overflow:hidden}@media(max-width:820px){#quiz{min-height:560px}.opts{min-height:220px}}
</style>
</head>
<body>
<main>
<header class="card"><div class="row top"><div><h1>AKG PPL Quiz</h1><p id="status" class="muted">Läser frågor...</p></div><div class="row"><span class="pill">1-4 svar</span><span class="pill">Enter nästa</span><span class="pill">Z zoom</span><span class="pill">←/→ bläddra</span></div></div><div id="log" class="log hidden"></div></header>
<section class="card filters"><label class="field">Kurs<select id="course"></select></label><label class="field">Område<select id="area"></select></label><label class="field">Nivå<select id="level"><option>Alla</option><option>1</option><option>2</option><option>3</option></select></label><label class="field">Läge<select id="mode"><option value="study">Quiz</option><option value="answers">Rätta svar</option><option value="exam">Prov 20/20</option><option value="wrong">Fel svar</option><option value="smart">Smart repetition</option></select></label><button id="start" class="btn primary" type="button">Starta</button></section>
<section id="quiz" class="card"></section>
<section id="stats" class="card hidden"></section>
<section id="edit" class="card hidden"></section>
<footer class="card"><p class="muted">Frågor: <code>questions/050_Meteorologi.txt</code>, <code>questions/060_Navigation.txt</code>, <code>questions/090_Kommunikation.txt</code>. Bilder: <code>images_all/050_Q_001.jpg</code>.</p><div class="bottom"><label class="field">Ladda frågor/bilder<input id="files" type="file" multiple accept=".txt,.json,.png,.jpg,.jpeg,.webp,.svg"></label><button id="editBtn" class="btn" type="button">Edit mode</button><button id="statsBtn" class="btn" type="button">Statistik</button><button id="theme" class="btn theme" type="button" aria-pressed="false">Mörkt läge</button></div></footer>
</main>
<div id="lb" class="lightbox hidden"><div class="lightboxTop"><b id="lbTitle">Bild</b><div class="row"><button id="fit" class="btn" type="button">100%</button><button id="close" class="btn" type="button">Minimera</button></div></div><div class="lightboxBody"><img id="lbImg" class="fit" alt="Zoomad bild"></div></div>
<script>
(()=>{'use strict';
const EXAM_N=20,EXAM_MS=1200000,QS='akg_q_v5',SS='akg_s_v5',TS='akg_theme';
const DEF=[['050 Meteorologi','questions/050_Meteorologi.txt'],['060 Navigation','questions/060_Navigation.txt'],['090 Kommunikation','questions/090_Kommunikation.txt']];
const SAMPLE='050 Meteorologi\n===============\n\n1. [050 01 01 00] Atmosfären - nivå 1\nFråga: Vad är troposfären?\nRätt svar: Atmosfärens lägsta skikt där nästan allt väder uppstår\nFel svar: Skiktet ovanför tropopausen där väder uppstår | Atmosfärens lägsta skikt där temperaturen alltid är konstant | Skiktet där satelliter normalt navigerar\nFörklaring: Troposfären är skiktet närmast jorden och innehåller nästan allt flygväder.\n';
const $=x=>document.getElementById(x),E={status:$('status'),log:$('log'),course:$('course'),area:$('area'),level:$('level'),mode:$('mode'),quiz:$('quiz'),edit:$('edit'),stats:$('stats'),files:$('files'),lb:$('lb'),lbImg:$('lbImg'),lbTitle:$('lbTitle'),theme:$('theme')};
let S={q:[],sess:[],i:0,score:0,pick:null,ans:{},done:false,review:[],imgs:{},stats:get(SS,{}),mode:'study',course:'Alla',area:'Alla',level:'Alla',timer:null,end:0,edit:false,statsOpen:false};
function get(k,f){try{return JSON.parse(localStorage.getItem(k)||'')||f}catch{return f}}function put(k,v){localStorage.setItem(k,JSON.stringify(v))}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function pad(n){return String(+n||0).padStart(3,'0')}function sh(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}function uniq(a){return [...new Set(a)]}
function courseOf(x){x=String(x).replaceAll('_',' ');return x.includes('050')?'050 Meteorologi':x.includes('060')?'060 Navigation':x.includes('090')?'090 Kommunikation':'Okänd kurs'}
function parse(txt,name){let out=[],warn=[],course=courseOf(name),cur=null,ln=txt.replace(/^\uFEFF/,'').replaceAll('\r','').split('\n');let flush=n=>{if(!cur)return;let miss=[];if(!cur.question)miss.push('Fråga');if(!cur.answer)miss.push('Rätt svar');if(cur.wrong.length<3)miss.push('3 fel svar');if(!cur.explanation)miss.push('Förklaring');if(miss.length)warn.push((cur.ref||'?')+': saknar '+miss.join(', ')+' före rad '+n);cur.id=(cur.course.slice(0,3)+'-'+pad(cur.num)+'-'+cur.ref).replace(/\s+/g,'_');out.push(cur);cur=null};
ln.forEach((raw,i)=>{let s=raw.trim(),m;if(!s||/^=+$/.test(s))return;if(/^(050|060|090)\s+/.test(s)&&!s.includes('[')){flush(i+1);course=s;return}m=s.match(/^(\d+)\.\s*\[([^\]]+)\]\s*(.*)$/);if(m){flush(i+1);let rest=m[3],p=rest.toLowerCase().lastIndexOf(' - nivå ');cur={course,num:+m[1],ref:m[2].trim(),area:p>-1?rest.slice(0,p).trim():rest,level:+(p>-1?rest.slice(p+8):1)||1,question:'',answer:'',wrong:[],explanation:'',image:'',noImage:false};return}if(!cur)return;if(s.startsWith('Fråga:'))cur.question=s.slice(6).trim();else if(s.startsWith('Rätt svar:'))cur.answer=s.slice(10).trim();else if(s.startsWith('Fel svar:'))cur.wrong=s.slice(9).split('|').map(x=>x.trim()).filter(Boolean);else if(s.startsWith('Förklaring:'))cur.explanation=s.slice(11).trim();else if(s.startsWith('Bild:')){let v=s.slice(5).trim();cur.noImage=/^(none|ingen|-)$/i.test(v);cur.image=cur.noImage?'':v}});flush(ln.length+1);return{q:out.map(fixQ).filter(Boolean),warn}}
function fixQ(q){let w=[];(q.wrong||[]).forEach(x=>{if(x&&x!==q.answer&&!w.includes(x))w.push(x)});if(!q.question||!q.answer||w.length<3)return null;q.wrong=w.slice(0,3);q.options=sh([q.answer,...q.wrong]);return q}
function say(t,logs=[]){E.status.textContent=t;E.log.innerHTML='';E.log.classList.toggle('hidden',!logs.length);logs.slice(0,20).forEach(x=>E.log.insertAdjacentHTML('beforeend','<div>'+esc(x)+'</div>'))}
function load(q,src,w=[]){clear();S.q=q.map(fixQ).filter(Boolean);put(QS,S.q);let c={};S.q.forEach(x=>c[x.course]=(c[x.course]||0)+1);say(src+': '+S.q.length+' frågor',Object.entries(c).map(x=>x[0]+': '+x[1]).concat(w));fillFilters();start()}
function fill(sel,vals,cur){sel.innerHTML=vals.map(v=>`<option ${v===cur?'selected':''}>${esc(v)}</option>`).join('')}function fillFilters(){let cs=['Alla',...uniq(S.q.map(q=>q.course))];if(!cs.includes(S.course))S.course='Alla';let as=['Alla',...uniq(S.q.filter(q=>S.course==='Alla'||q.course===S.course).map(q=>q.area))];if(!as.includes(S.area))S.area='Alla';fill(E.course,cs,S.course);fill(E.area,as,S.area);E.level.value=S.level;E.mode.value=S.mode;$('editBtn').textContent=S.edit?'Stäng edit':'Edit mode';$('statsBtn').textContent=S.statsOpen?'Dölj statistik':'Statistik'}
function filt(){return S.q.filter(q=>(S.course==='Alla'||q.course===S.course)&&(S.area==='Alla'||q.area===S.area)&&(S.level==='Alla'||String(q.level)===S.level))}function deck(){let d=filt();if(S.mode==='wrong')d=d.filter(q=>st(q.id).lastWrong);if(S.mode==='smart')d=d.sort((a,b)=>weight(b)-weight(a));return sh(d)}function weight(q){let s=st(q.id);return (s.w||0)*3+(s.u||0)*2-(s.a||0)*.2+Math.random()}function st(id){return S.stats[id]||(S.stats[id]={a:0,c:0,w:0,u:0,lastWrong:false})}
function start(){clear();S.i=0;S.score=0;S.pick=null;S.ans={};S.done=false;S.review=[];S.why='';if(S.mode==='answers'){S.sess=filt();renderAnswers();renderEdit();renderStats();return}S.sess=deck().map(q=>({...q,options:sh([q.answer,...q.wrong])}));if(S.mode==='exam'){S.sess=S.sess.slice(0,Math.min(EXAM_N,S.sess.length));S.end=Date.now()+EXAM_MS;S.timer=setInterval(tick,1000)}render();renderEdit();renderStats()}function clear(){if(S.timer)clearInterval(S.timer);S.timer=null}
function cur(){return S.sess[Math.min(S.i,Math.max(0,S.sess.length-1))]}function tick(){let t=$('timer');if(!t)return;let left=S.mode==='exam'&&!S.done?S.end-Date.now():EXAM_MS;t.textContent='Tid: '+fmt(left);t.style.color=left<120000?'var(--bad)':'';if(left<=0)finish('Tiden är slut')}function fmt(ms){ms=Math.max(0,ms);let s=Math.ceil(ms/1000);return String(s/60|0).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function recalc(){S.score=Object.values(S.ans).filter(a=>a&&a.ok).length}
function answer(opt){let q=cur();if(!q||S.done)return;let ok=opt===q.answer;if(S.mode!=='exam'&&S.ans[q.id])return;S.ans[q.id]={q,chosen:opt,ok};S.pick=opt;recalc();if(S.mode!=='exam'){record(q,ok);S.review.push({q,chosen:opt,ok});render();if(ok)setTimeout(next,420)}else render()}
function record(q,ok){let s=st(q.id);s.a++;ok?(s.c++,s.lastWrong=false):(s.w++,s.lastWrong=true);put(SS,S.stats)}
function go(d){if(!S.sess.length)return;S.i=Math.max(0,Math.min(S.sess.length-1,S.i+d));let a=S.ans[cur()?.id];S.pick=a?a.chosen:null;render();renderEdit()}
function next(){if(S.mode==='answers'){S.i+1>=S.sess.length?renderAnswers():go(1);return}S.i+1>=S.sess.length?finish(S.mode==='exam'?'Provet avslutat':'Klart'):go(1)}
function prev(){go(-1)}function skip(){next()}function finishExam(){finish('Provet avslutat')}
function finish(txt){clear();if(S.mode==='exam')S.review=S.sess.map(q=>S.ans[q.id]||{q,chosen:'Ej besvarad',ok:false,skip:true});S.done=true;S.why=txt;if(S.mode==='exam')S.review.forEach(r=>{if(!r.skip)record(r.q,r.ok)});render();renderStats()}
function render(){if(S.mode==='answers')return renderAnswers();let q=cur(),n=S.sess.length;E.quiz.innerHTML='';if(!q||S.done)return endView();let saved=S.ans[q.id],chosen=saved&&saved.chosen;S.pick=chosen||null;let pct=n?S.i/n*100:0;E.quiz.insertAdjacentHTML('beforeend',`<div class="qtop"><div><div class="meta"><span>${esc(q.ref)}</span><span>${esc(q.course)}</span><span>${esc(q.area)}</span><span>Nivå ${q.level}</span><span>${modeName()}</span><span>${S.i+1}/${n}</span></div><h2 style="margin-top:12px">${esc(q.question)}</h2></div><div class="score">${S.mode==='exam'?'<span id="timer"></span><br>':''}Poäng: ${S.score}</div></div><div class="bar"><i style="width:${pct}%"></i></div>`);let im=imgBlock(q);if(im)E.quiz.append(im);let opts=document.createElement('div');opts.className='opts';q.options.forEach((o,i)=>{let b=document.createElement('button');b.className='opt';b.textContent=(i+1)+'. '+o;if(chosen){if(S.mode!=='exam')b.disabled=true;if(S.mode==='exam'&&o===chosen)b.classList.add('chosen');else{if(o===q.answer)b.classList.add('right');if(o===chosen&&o!==q.answer)b.classList.add('wrong')}}b.onclick=()=>answer(o);opts.append(b)});E.quiz.append(opts);E.quiz.insertAdjacentHTML('beforeend',`<div class="row" style="margin-top:14px"><button class="btn" onclick="app.prev()" ${S.i===0?'disabled':''}>Föregående</button><button class="btn" onclick="app.skip()">${S.i+1>=n?'Avsluta':'Nästa / hoppa över'}</button>${S.mode==='exam'?'<button class="btn primary" onclick="app.finishExam()">Lämna in prov</button>':''}</div>`);if(chosen&&chosen!==q.answer&&S.mode!=='exam')E.quiz.insertAdjacentHTML('beforeend',`<div class="explain"><b>Rätt svar: ${esc(q.answer)}</b><p>${esc(q.explanation)}</p><button class="btn primary" onclick="app.next()">Nästa fråga</button></div>`);tick()}
function endView(){let n=S.sess.length,wrong=S.review.filter(r=>!r.ok);E.quiz.innerHTML=`<h2>${n?(S.mode==='exam'?'Prov klart!':'Klart!'):'Inga frågor hittades'}</h2><p>${S.why?esc(S.why)+'. ':''}Resultat: ${S.score} / ${n}</p><div class="row"><button class="btn primary" onclick="app.start()">Starta om</button>${wrong.length?'<button class="btn" onclick="app.retryWrong()">Träna fel igen</button>':''}</div>`;if(S.review.length){let r=document.createElement('div');r.className='review';S.review.forEach((x,i)=>{if(x.ok&&S.mode==='exam')return;r.insertAdjacentHTML('beforeend',`<div class="item ${x.ok?'':'bad'}"><b>${i+1}. ${esc(x.q.question)}</b><br>Ditt svar: ${esc(x.chosen)}<br>Rätt: ${esc(x.q.answer)}<br><span class="muted">${esc(x.q.explanation)}</span></div>`)});E.quiz.append(r)}}function retryWrong(){S.mode='study';S.sess=S.review.filter(r=>!r.ok).map(r=>({...r.q,options:sh([r.q.answer,...r.q.wrong])}));S.i=0;S.score=0;S.pick=null;S.ans={};S.done=false;S.review=[];fillFilters();render()}
function modeName(){return {study:'Quiz',answers:'Rätta svar',exam:'Prov: 20 frågor / 20 min',wrong:'Fel svar',smart:'Smart repetition'}[S.mode]||S.mode}
function renderAnswers(){let n=S.sess.length,q=cur();E.quiz.innerHTML='';if(!q){E.quiz.innerHTML='<h2>Rätta svar</h2><p class="muted">Inga frågor hittades med aktuell filtrering.</p>';return}let pct=n?S.i/n*100:0;E.quiz.insertAdjacentHTML('beforeend',`<div class="qtop"><div><div class="meta"><span>${esc(q.ref)}</span><span>${esc(q.course)}</span><span>${esc(q.area)}</span><span>Nivå ${q.level}</span><span>Rätta svar</span><span>${S.i+1}/${n}</span></div><h2 style="margin-top:12px">${esc(q.question)}</h2></div></div><div class="bar"><i style="width:${pct}%"></i></div>`);let im=imgBlock(q);if(im)E.quiz.append(im);E.quiz.insertAdjacentHTML('beforeend',`<div class="item answerCard"><p><b>Rätt svar:</b> ${esc(q.answer)}</p>${q.explanation?'<p class="muted">'+esc(q.explanation)+'</p>':''}</div><div class="row" style="margin-top:14px"><button class="btn" onclick="app.prev()" ${S.i===0?'disabled':''}>Föregående</button><button class="btn" onclick="app.next()" ${S.i+1>=n?'disabled':''}>Nästa</button></div>`)}
function imgNames(q){if(q.noImage)return[];let c=q.course.slice(0,3),p=pad(q.num),p2=String(q.num).padStart(2,'0'),keys=[c+'_Q_'+p,c+'_Q_'+p2,c+'_IMG_'+p2,p,p2,String(q.num)];let out=q.image?[imgMap(q.image)]:[];keys.forEach(k=>['images_all/','images_quizsafe/','images_actual/','images/'].forEach(f=>['.jpg','.png','.jpeg','.webp','.svg'].forEach(e=>out.push(f+k+e))));return uniq(out)}function imgMap(p){let b=String(p).split('/').pop(),k=norm(b);return S.imgs[p]||S.imgs[b]||S.imgs[k]||p}function norm(s){return String(s).split('/').pop().replace(/\.[^.]+$/,'').toUpperCase().replace(/[^A-Z0-9]+/g,'_')}function regImg(f){let u=URL.createObjectURL(f),b=f.name,k=norm(b);[b,k,'images_all/'+b,'images_quizsafe/'+b,'images/'+b].forEach(x=>S.imgs[x]=u)}function fallback(img,a,fail){let i=0;img.onerror=()=>i>=a.length?fail&&fail():(img.src=a[i++]);img.onerror()}
function imgBlock(q){let a=imgNames(q);if(!a.length)return null;let w=document.createElement('div');w.className='imgbox pending';let img=document.createElement('img');img.alt='Bildfråga: '+q.question;img.onload=()=>{w.className='imgbox';w.innerHTML='<header><b>Bild till frågan</b><span class="row"><button class="btn">Minimera</button><button class="btn">Zooma</button></span></header><p class="muted">Klicka på bilden för att zooma.</p><div class="imghold"></div>';w.querySelectorAll('button')[0].onclick=()=>{w.classList.toggle('min');w.querySelector('button').textContent=w.classList.contains('min')?'Visa bild':'Minimera'};w.querySelectorAll('button')[1].onclick=()=>zoom(img.src,img.alt);img.onclick=()=>zoom(img.src,img.alt);w.querySelector('.imghold').append(img)};fallback(img,a,()=>w.remove());return w}function zoom(src,title){E.lbImg.src=src;E.lbTitle.textContent=title||'Bild';E.lbImg.classList.add('fit');$('fit').textContent='100%';E.lb.classList.remove('hidden');document.body.style.overflow='hidden'}function closeZoom(){E.lb.classList.add('hidden');E.lbImg.src='';document.body.style.overflow=''}
function renderStats(){if(!S.statsOpen){E.stats.classList.add('hidden');return}E.stats.classList.remove('hidden');let vals=Object.values(S.stats).filter(s=>s&&s.a>0),a=vals.reduce((n,s)=>n+(s.a||0),0),c=vals.reduce((n,s)=>n+(s.c||0),0),w=vals.reduce((n,s)=>n+(s.w||0),0);E.stats.innerHTML=`<h2>Statistik</h2><div class="statsGrid"><div class="item"><b>${a}</b><br>Besvarade</div><div class="item"><b>${a?Math.round(c/a*100):0}%</b><br>Rätt</div><div class="item"><b>${w}</b><br>Fel</div></div>`;areaStats().slice(0,10).forEach(x=>E.stats.insertAdjacentHTML('beforeend',`<div class="item"><b>${esc(x.k)}</b><br>${x.c}/${x.a} rätt (${x.r}%)</div>`));E.stats.insertAdjacentHTML('beforeend','<button id="resetStatsBtn" class="btn danger" type="button">Nollställ statistik</button>');$('resetStatsBtn').onclick=resetStats}function areaStats(){let m={};S.q.forEach(q=>{let s=S.stats[q.id];if(!s||!s.a)return;let k=q.course+' / '+q.area,o=m[k]||(m[k]={k,a:0,c:0});o.a+=s.a;o.c+=s.c||0});return Object.values(m).map(x=>({...x,r:Math.round(x.c/x.a*100)})).sort((a,b)=>a.r-b.r)}function resetStats(){S.stats={};localStorage.removeItem(SS);say('Statistiken är nollställd.');if(S.mode==='wrong'||S.mode==='smart')start();else{render();renderStats()}}
function renderEdit(){if(!S.edit){E.edit.classList.add('hidden');return}E.edit.classList.remove('hidden');let q=cur()||S.q[0];if(!q){E.edit.textContent='Ingen fråga';return}let f=(lab,id,val,ta=false,wide=false)=>`<label class="field ${wide?'wide':''}">${lab}<${ta?'textarea':'input'} id="${id}" ${ta?'':'value="'+esc(val)+'"'}>${ta?esc(val)+'</textarea>':''}</label>`;E.edit.innerHTML='<h2>Edit mode</h2><div class="editGrid">'+f('Kurs','ec',q.course)+f('Ref','er',q.ref)+f('Område','ea',q.area)+f('Nivå','elv',q.level)+f('Fråga','eq',q.question,true,true)+f('Rätt svar','eans',q.answer,true,true)+f('Fel svar 1','ew1',q.wrong[0],true)+f('Fel svar 2','ew2',q.wrong[1],true)+f('Fel svar 3','ew3',q.wrong[2],true)+f('Förklaring','ex',q.explanation,true,true)+f('Bild-path','ei',q.image)+'</div><div class="row" style="margin-top:12px"><button class="btn primary" onclick="app.saveEdit()">Spara</button><button class="btn" onclick="app.addQ()">Ny fråga</button><button class="btn danger" onclick="app.delQ()">Ta bort</button><button class="btn" onclick="app.exportCourse()">Exportera kurs</button><button class="btn" onclick="app.exportAll()">Exportera alla</button></div>'}
function saveEdit(){let q=cur()||S.q[0];Object.assign(q,{course:val('ec'),ref:val('er'),area:val('ea'),level:+val('elv')||1,question:val('eq'),answer:val('eans'),wrong:[val('ew1'),val('ew2'),val('ew3')],explanation:val('ex'),image:val('ei')});q.id=(q.course.slice(0,3)+'-'+pad(q.num)+'-'+q.ref).replace(/\s+/g,'_');fixQ(q);put(QS,S.q);fillFilters();render();renderEdit()}function val(id){return $(id).value.trim()}function addQ(){let a=cur()||S.q[0],q={...a,num:(a.num||0)+1,ref:a.course.slice(0,3)+' NEW',question:'Ny fråga',answer:'Rätt svar',wrong:['Fel svar 1','Fel svar 2','Fel svar 3'],explanation:'Förklaring',image:''};fixQ(q);S.q.splice(S.q.indexOf(a)+1,0,q);put(QS,S.q);start()}function delQ(){let q=cur();if(q&&confirm('Ta bort frågan?')){S.q=S.q.filter(x=>x!==q);put(QS,S.q);start()}}
function fmtCourse(c){let a=[c,'='.repeat(c.length),''];S.q.filter(q=>q.course===c).forEach((q,i)=>{a.push(`${i+1}. [${q.ref}] ${q.area} - nivå ${q.level}`);if(q.image)a.push('Bild: '+q.image);a.push('Fråga: '+q.question,'Rätt svar: '+q.answer,'Fel svar: '+q.wrong.join(' | '),'Förklaring: '+q.explanation,'')});return a.join('\n')}function dl(name,text,type='text/plain;charset=utf-8'){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;document.body.append(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500)}function exportCourse(){let c=(cur()||{}).course||S.course;dl(c.replaceAll(' ','_')+'.txt',fmtCourse(c))}function exportAll(){uniq(S.q.map(q=>q.course)).forEach((c,i)=>setTimeout(()=>dl(c.replaceAll(' ','_')+'.txt',fmtCourse(c)),i*200));dl('akg_ppl_backup.json',JSON.stringify(S.q,null,2),'application/json')}
async function boot(){let local=get(QS,null);if(local?.length)return load(local,'Laddat från lokal sparning');try{let all=[],warn=[];for(let [name,file] of DEF){try{let r=await fetch(file,{cache:'no-store'});if(!r.ok){warn.push(file+' saknas');continue}let p=parse(await r.text(),name);all.push(...p.q);warn.push(...p.warn)}catch(e){warn.push(file+': '+e.message)}}if(!all.length)throw Error('inga filer');load(all,'Automatiskt inläst från questions/',warn)}catch(e){let p=parse(SAMPLE,'sample');load(p.q,'Demo - kunde inte läsa frågefiler',[e.message])}}
function key(e){if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;if(/[1-4]/.test(e.key)&&S.mode!=='answers'){let q=cur();if(q)answer(q.options[+e.key-1])}else if(e.key==='Enter'){if(S.mode==='answers')next();else S.pick?next():S.done&&start()}else if(e.key==='ArrowRight'){next()}else if(e.key==='ArrowLeft'){prev()}else if(e.key.toLowerCase()==='z'){let im=document.querySelector('.imgbox img');if(im)zoom(im.src,im.alt)}}
$('start').onclick=start;E.course.onchange=e=>{S.course=e.target.value;fillFilters();start()};E.area.onchange=e=>{S.area=e.target.value;start()};E.level.onchange=e=>{S.level=e.target.value;start()};E.mode.onchange=e=>{S.mode=e.target.value;start()};$('editBtn').onclick=()=>{S.edit=!S.edit;fillFilters();renderEdit()};$('statsBtn').onclick=()=>{S.statsOpen=!S.statsOpen;fillFilters();renderStats()};$('close').onclick=closeZoom;E.lb.onclick=e=>{if(e.target===E.lb)closeZoom()};$('fit').onclick=()=>{let f=E.lbImg.classList.toggle('fit');$('fit').textContent=f?'100%':'Anpassa'};document.addEventListener('keydown',key);E.files.onchange=async e=>{let fs=[...e.target.files],txt=[];fs.forEach(f=>/\.(png|jpe?g|webp|svg)$/i.test(f.name)?regImg(f):txt.push(f));if(txt.length){let all=[],w=[];for(let f of txt){if(f.name.endsWith('.json'))all.push(...JSON.parse(await f.text()));else{let p=parse(await f.text(),f.name);all.push(...p.q);w.push(...p.warn)}}load(all,'Uppladdat '+txt.length+' frågefil(er)',w)}else{say('Uppladdade bilder matchas automatiskt.');render()}e.target.value=''};
function setTheme(t){document.body.classList.toggle('dark',t==='dark');E.theme.setAttribute('aria-pressed',String(t==='dark'));E.theme.textContent=t==='dark'?'Ljust läge':'Mörkt läge';localStorage.setItem(TS,t)}E.theme.onclick=()=>setTheme(document.body.classList.contains('dark')?'light':'dark');setTheme(localStorage.getItem(TS)||'light');window.app={next,prev,skip,finishExam,start,retryWrong,resetStats,saveEdit,addQ,delQ,exportCourse,exportAll};boot();
})();
